name: Build

on:
  push:
    branches: ["main"]

  workflow_dispatch:

jobs:
  build-and-analysis:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.DOCKER_USERNAME }}_satc-devops
            -Dsonar.organization=${{ secrets.DOCKER_USERNAME }}
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=.
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t docker.io/${{ secrets.DOCKER_USERNAME }}/satc-devops:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push docker.io/${{ secrets.DOCKER_USERNAME }}/satc-devops:${{ github.sha }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: docker.io/${{ secrets.DOCKER_USERNAME }}/satc-devops:${{ github.sha }}
          format: json
          output: trivy-results.json
          severity: MEDIUM,HIGH,CRITICAL

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results.json
          path: trivy-results.json

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Analyze Trivy results
        run: |
          VULN_COUNT_MEDIUM=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "MEDIUM")] | length' trivy-results.json)

          VULN_COUNT_HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' trivy-results.json)

          echo "Medium: $VULN_COUNT_MEDIUM"
          echo "High: $VULN_COUNT_HIGH"

          if [ "$VULN_COUNT_MEDIUM" -gt 50 ]; then
            echo "Muitas vulnerabilidades MEDIUM"
            exit 1
          fi

          if [ "$VULN_COUNT_HIGH" -gt 50 ]; then
            echo "Muitas vulnerabilidades HIGH"
            exit 1
          fi